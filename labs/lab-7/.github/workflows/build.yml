name: Build

# Cancel in-progress runs for the same branch — avoids wasted CI minutes on stale commits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Always set a timeout — hanging Testcontainers or Maven builds waste CI slots
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache the ~/.m2/repository — skips downloading ~200 MB of dependencies every run
          cache: maven

      - name: Run unit tests
        run: ./mvnw test --fail-at-end

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        # Always upload so we can see reports even when tests fail
        if: always()
        with:
          name: unit-test-reports
          path: target/surefire-reports/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run integration tests if unit tests passed
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Pre-pull the Testcontainers image so the pull doesn't count against test time
      - name: Pre-pull Testcontainers images
        run: docker pull postgres:16-alpine

      # Enable container reuse: Testcontainers reuses an already-running container
      # instead of starting a new one. Speeds up runs when Docker images are cached.
      - name: Enable Testcontainers container reuse
        run: echo "testcontainers.reuse.enable=true" >> ~/.testcontainers.properties

      - name: Run integration tests
        run: ./mvnw verify -DskipUnitTests --fail-at-end
        env:
          # Testcontainers uses Ryuk to clean up containers — disable in CI if needed
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: target/failsafe-reports/
          retention-days: 7

  docker-smoke-test:
    name: Docker Image Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build the production Docker image using Cloud Native Buildpacks
      # This catches: missing system libraries, wrong JVM flags, broken ENTRYPOINT
      - name: Build Docker image
        run: ./mvnw spring-boot:build-image -DskipTests -Dspring-boot.build-image.imageName=lab-7:ci

      - name: Upload screenshot artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-ui-screenshots
          path: |
            **/target/screenshots/
            **/target/videos/
          retention-days: 14
